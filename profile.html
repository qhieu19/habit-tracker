<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ — HabitFlow</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
</head>

<body>

    <!-- LOGIN SCREEN -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-dot"></div>HabitFlow
            </div>
            <p class="login-sub">Đăng nhập để đồng bộ thói quen của bạn lên đám mây</p>
            <button class="google-btn" id="googleSignInBtn" onclick="signInWithGoogle()">
                <svg width="22" height="22" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                Đăng nhập với Google
            </button>
            <p class="login-error" id="loginError"></p>
            <p class="login-loading" id="loginLoading">Đang đăng nhập...</p>
        </div>
    </div>

    <!-- PROFILE SETUP MODAL (first login) -->
    <div class="modal-overlay" id="profileOverlay">
        <div class="modal">
            <h3>👋 Chào mừng! Hãy tạo hồ sơ</h3>
            <div class="form-group">
                <label>Tên hiển thị</label>
                <input type="text" id="profileName" placeholder="Tên của bạn" />
            </div>
            <div class="form-group">
                <label>Tuổi</label>
                <input type="number" id="profileAge" placeholder="25" min="1" max="120" />
            </div>
            <div class="form-group">
                <label>Giới tính</label>
                <select id="profileGender">
                    <option value="">Chọn...</option>
                    <option value="male">Nam</option>
                    <option value="female">Nữ</option>
                    <option value="other">Khác</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-save" style="flex:1" onclick="saveProfile()">Bắt đầu 🚀</button>
            </div>
        </div>
    </div>

    <div id="appContent" class="hidden">
        <header>
            <a class="logo" href="index.html">
                <div class="logo-dot"></div>HabitFlow
            </a>
            <div class="header-right">
                <span class="greeting" id="userGreeting"></span>
                <a href="index.html" class="add-btn"
                    style="background:var(--surface2);color:var(--text);border:1px solid var(--border);text-decoration:none;">←
                    Trang chủ</a>
                <button class="add-btn" onclick="signOut()"
                    style="background:var(--surface2);color:var(--text);border:1px solid var(--border);"
                    title="Đăng xuất">Đăng xuất</button>
            </div>
        </header>

        <div class="profile-page">
            <a href="index.html" class="back-link">← Quay lại trang chủ</a>

            <div class="profile-card" id="profileView">
                <div class="profile-avatar-large" id="profileAvatarLarge">?</div>
                <h2>👤 Hồ sơ của bạn</h2>
                <div class="profile-info-row">
                    <span class="profile-info-label">Tên</span>
                    <span class="profile-info-value" id="viewName">—</span>
                </div>
                <div class="profile-info-row">
                    <span class="profile-info-label">Tuổi</span>
                    <span class="profile-info-value" id="viewAge">—</span>
                </div>
                <div class="profile-info-row">
                    <span class="profile-info-label">Giới tính</span>
                    <span class="profile-info-value" id="viewGender">—</span>
                </div>
                <div class="profile-actions">
                    <button class="btn-save" onclick="showEditForm()">✏️ Chỉnh sửa</button>
                </div>
            </div>

            <!-- EDIT FORM (hidden by default) -->
            <div class="profile-card hidden" id="profileEdit">
                <h2>✏️ Chỉnh sửa hồ sơ</h2>
                <div class="form-group">
                    <label>Tên hiển thị</label>
                    <input type="text" id="editName" placeholder="Tên của bạn" />
                </div>
                <div class="form-group">
                    <label>Tuổi</label>
                    <input type="number" id="editAge" placeholder="25" min="1" max="120" />
                </div>
                <div class="form-group">
                    <label>Giới tính</label>
                    <select id="editGender">
                        <option value="">Chọn...</option>
                        <option value="male">Nam</option>
                        <option value="female">Nữ</option>
                        <option value="other">Khác</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn-cancel" onclick="cancelEdit()">Hủy</button>
                    <button class="btn-save" onclick="saveEditedProfile()">Lưu thay đổi</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const GENDER_MAP = { male: 'Nam', female: 'Nữ', other: 'Khác' };

        function renderProfile() {
            if (!userProfile) return;
            document.getElementById('viewName').textContent = userProfile.name || '—';
            document.getElementById('viewAge').textContent = userProfile.age || '—';
            document.getElementById('viewGender').textContent = GENDER_MAP[userProfile.gender] || '—';
            document.getElementById('profileAvatarLarge').textContent = userProfile.name ? userProfile.name.charAt(0).toUpperCase() : '?';
        }

        function showEditForm() {
            if (userProfile) {
                document.getElementById('editName').value = userProfile.name || '';
                document.getElementById('editAge').value = userProfile.age || '';
                document.getElementById('editGender').value = userProfile.gender || '';
            }
            document.getElementById('profileView').classList.add('hidden');
            document.getElementById('profileEdit').classList.remove('hidden');
        }

        function cancelEdit() {
            document.getElementById('profileEdit').classList.add('hidden');
            document.getElementById('profileView').classList.remove('hidden');
        }

        function saveEditedProfile() {
            const name = document.getElementById('editName').value.trim();
            const age = parseInt(document.getElementById('editAge').value) || null;
            const gender = document.getElementById('editGender').value || null;
            if (!name) {
                document.getElementById('editName').focus();
                document.getElementById('editName').style.borderColor = 'var(--danger)';
                return;
            }
            userProfile = { name, age, gender };
            save();
            updateGreeting();
            renderProfile();
            cancelEdit();
        }

        function onAuthReady() {
            renderProfile();
        }

        initAuth();
    </script>
</body>

</html>
